<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容工坊 · 登录</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root {
      --brand: #1890FF;
      --brand-hover: #40a9ff;
      --brand-active: #096dd9;
      --brand-glow: rgba(24,144,255,.25);
      --bg-deep: #0a0e27;
      --bg-card: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08);
      --text: #e8eaed;
      --text-dim: #7c85a0;
      --text-muted: #5a6380;
      --danger: #ff4d4f;
      --radius: 12px;
      --transition: .25s cubic-bezier(.4,0,.2,1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 动态光斑背景 */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .12;
      pointer-events: none;
    }
    .bg-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: var(--brand);
      top: -200px; left: -150px;
      animation: orb1 20s ease-in-out infinite;
    }
    .bg-orb:nth-child(2) {
      width: 500px; height: 500px;
      background: #722ed1;
      bottom: -200px; right: -100px;
      animation: orb2 25s ease-in-out infinite;
    }
    @keyframes orb1 {
      0%,100% { transform: translate(0,0) scale(1) }
      33% { transform: translate(80px,60px) scale(1.1) }
      66% { transform: translate(-30px,-40px) scale(.9) }
    }
    @keyframes orb2 {
      0%,100% { transform: translate(0,0) scale(1) }
      33% { transform: translate(-60px,-40px) scale(.85) }
      66% { transform: translate(50px,30px) scale(1.15) }
    }

    /* 网格线装饰 */
    .grid-lines {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 0 24px;
    }

    /* 卡片 */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 32px rgba(0,0,0,.4),
                  0 0 0 1px rgba(24,144,255,.06) inset;
      animation: fadeUp .6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px) }
      to { opacity: 1; transform: translateY(0) }
    }

    /* Logo 区域 */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--brand) 0%, #69c0ff 100%);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px var(--brand-glow);
    }
    .logo-area h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }
    .logo-area .sub {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* 表单 */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color var(--transition);
    }
    .input-wrap input {
      width: 100%;
      height: 48px;
      padding: 0 14px 0 42px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: all var(--transition);
    }
    .input-wrap input::placeholder {
      color: var(--text-muted);
    }
    .input-wrap input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-glow);
      background: rgba(24,144,255,.06);
    }
    .input-wrap input:focus ~ .icon,
    .input-wrap input:focus + .icon {
      color: var(--brand);
    }
    /* icon is before input, so use :focus-within on parent */
    .input-wrap:focus-within .icon {
      color: var(--brand);
    }

    /* 密码可见切换 */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      transition: color var(--transition);
    }
    .toggle-pw:hover {
      color: var(--text-dim);
    }

    /* 行内操作 */
    .row-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      font-size: .8rem;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      cursor: pointer;
    }
    .remember input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: rgba(255,255,255,.04);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      flex-shrink: 0;
    }
    .remember input[type=checkbox]:checked {
      background: var(--brand);
      border-color: var(--brand);
    }
    .remember input[type=checkbox]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .forgot {
      color: var(--brand);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition);
    }
    .forgot:hover {
      color: var(--brand-hover);
    }

    /* 按钮 */
    .btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, #40a9ff 100%);
      color: #fff;
      box-shadow: 0 4px 16px var(--brand-glow);
      letter-spacing: .5px;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(24,144,255,.4);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0);
      background: var(--brand-active);
    }

    /* 分割线 */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: .75rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 注册入口 */
    .register-area {
      text-align: center;
    }
    .btn-outline {
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      font-size: .95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-outline:hover {
      border-color: var(--brand);
      background: rgba(24,144,255,.06);
      color: var(--brand);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: .75rem;
      color: var(--text-muted);
      animation: fadeUp .6s .1s ease both;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 28px;
      border-radius: 10px;
      font-size: .85rem;
      font-weight: 500;
      z-index: 999;
      animation: toastIn .3s ease;
      pointer-events: none;
    }
    .toast.success {
      background: #1890FF;
      color: #fff;
    }
    .toast.error {
      background: #ff4d4f;
      color: #fff;
    }
    .toast.info {
      background: rgba(255,255,255,.1);
      color: #e8eaed;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px) }
      to { opacity: 1; transform: translateX(-50%) translateY(0) }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 36px 24px }
    }
  </style>
</head>
<body>

  <!-- 动态背景 -->
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="grid-lines"></div>

  <div class="container">
    <div class="card">
      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-icon">✧</div>
        <h1>内容工坊</h1>
        <p class="sub">Content Studio · 登录</p>
      </div>

      <!-- 登录表单 -->
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="email">邮箱</label>
          <div class="input-wrap">
            <span class="icon">✉</span>
            <input id="email" type="email" placeholder="请输入邮箱地址" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <div class="input-wrap">
            <span class="icon">&#x1f512;</span>
            <input id="password" type="password" placeholder="请输入密码" required />
            <button type="button" class="toggle-pw" id="togglePw" title="显示/隐藏密码">👁</button>
          </div>
        </div>

        <div class="row-actions">
          <label class="remember">
            <input type="checkbox" id="remember" />
            记住登录
          </label>
          <a href="#" class="forgot" id="forgotLink">忘记密码？</a>
        </div>

        <button type="submit" class="btn btn-primary">登 录</button>
      </form>

      <!-- 分割线 -->
      <div class="divider">还没有账号？</div>

      <!-- 注册入口 -->
      <div class="register-area">
        <button type="button" class="btn-outline" id="registerBtn">创建账号</button>
      </div>
    </div>

    <!-- Footer -->
    <p class="footer">内容工坊 · 星流原型工坊 · v0.1</p>
  </div>

  <script>
    // 密码可见切换
    const togglePw = document.getElementById('togglePw');
    const passwordInput = document.getElementById('password');
    togglePw.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      togglePw.textContent = isHidden ? '🙈' : '👁';
    });

    // Toast
    function showToast(msg, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + (type || 'info');
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity .3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // 登录表单提交
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (!email) {
        showToast('请输入邮箱地址', 'error');
        return;
      }
      if (!password) {
        showToast('请输入密码', 'error');
        return;
      }

      // 原型阶段：模拟登录
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = '登录中...';
      btn.disabled = true;

      setTimeout(() => {
        showToast('原型阶段 · 登录功能开发中', 'info');
        btn.textContent = '登 录';
        btn.disabled = false;
      }, 800);
    });

    // 忘记密码
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('重置密码功能开发中', 'info');
    });

    // 注册
    document.getElementById('registerBtn').addEventListener('click', () => {
      showToast('注册功能开发中', 'info');
    });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.activeElement === passwordInput) {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });
  </script>

</body>
</html>
