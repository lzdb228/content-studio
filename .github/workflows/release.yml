name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  NODE_ENV: development

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Package
        run: |
          tar -czf content-studio.tar.gz -C dist .
          sha256sum content-studio.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          draft: true
          generate_release_notes: true
          files: |
            content-studio.tar.gz
            checksums.txt
