name: Release

on:
  push:
    tags: ['v*']

env:
  NODE_ENV: development

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            bundles: deb,rpm,appimage
            artifact: linux-packages
          - os: macos-latest
            target: macos
            bundles: dmg
            artifact: macos-package
          - os: windows-latest
            target: windows
            bundles: msi
            artifact: windows-package

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - run: npm ci
      - run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "内容工坊 v${{ github.ref_name }}"
          releaseDraft: true
          includeUpdaterJson: true
          args: --bundles ${{ matrix.bundles }}
